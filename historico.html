<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histórico de Orçamentos · Auditor de Precificação</title>
<style>
  :root{
    --bg:#F4F2EC; --surface:#FFFFFF; --ink:#1B1A16; --muted:#736F64; --hair:#E3DFD4;
    --solar:#E8820C; --teal:#0F3D3E; --positive:#2F7A4D; --negative:#B23A2E;
    --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --mono:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:28px 22px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto}

  header{margin-bottom:28px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .logo{width:28px;height:28px;border-radius:7px;background:var(--solar);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
  h1{margin:6px 0 4px;font-size:30px;font-weight:800;letter-spacing:-.5px}
  .sub{margin:0;color:var(--muted);font-size:14px}
  .btn{border:1px solid var(--hair);background:var(--surface);color:var(--ink);border-radius:9px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);text-decoration:none;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{border-color:var(--teal)}
  .btn.primary{background:var(--teal);color:#fff;border-color:var(--teal)}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
  .kpi{background:var(--surface);border:1px solid var(--hair);border-radius:14px;padding:16px 18px;border-top:3px solid var(--teal)}
  .kpi .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
  .kpi .v{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1}

  .card{background:var(--surface);border:1px solid var(--hair);border-radius:14px;overflow:hidden;margin-bottom:22px}
  .card-head{padding:16px 20px;border-bottom:1px solid var(--hair);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .card-head h3{margin:0;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase}

  .search-wrap{display:flex;align-items:center;border:1px solid var(--hair);border-radius:8px;background:var(--bg);overflow:hidden;width:260px}
  .search-wrap input{flex:1;border:none;outline:none;padding:8px 12px;font-size:13px;font-family:var(--sans);color:var(--ink);background:transparent}
  .search-wrap input:focus{outline:2px solid var(--solar);outline-offset:1px}

  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{padding:10px 16px;text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;border-bottom:1px solid var(--hair);white-space:nowrap}
  thead th.r{text-align:right}
  tbody tr{border-bottom:1px solid var(--hair);transition:background .12s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--bg)}
  td{padding:12px 16px;vertical-align:middle}
  td.r{text-align:right;font-family:var(--mono);font-size:13px}
  .proj-cell{font-weight:700;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .emp-cell{font-size:12px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .date-cell{color:var(--muted);font-size:12px;white-space:nowrap}
  .badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;font-family:var(--mono)}
  .badge.pos{background:#E8F5EE;color:var(--positive)}
  .badge.neg{background:#FDECEA;color:var(--negative)}

  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty .icon{font-size:36px;margin-bottom:12px}
  .empty p{margin:4px 0;font-size:14px}

  .loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}

  @media(max-width:700px){
    .hide-sm{display:none}
    .search-wrap{width:100%}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="logo">☀</div>
        <span class="eyebrow">Auditor de Precificação · Gestão</span>
      </div>
      <h1>Histórico de Orçamentos</h1>
      <p class="sub">Todos os orçamentos salvos, do mais recente ao mais antigo.</p>
    </div>
    <div>
      <a class="btn primary" href="index.html">← Voltar ao dashboard</a>
    </div>
  </header>

  <div class="kpis" id="kpis">
    <div class="kpi"><div class="k">Total de orçamentos</div><div class="v" id="kTotal">—</div></div>
    <div class="kpi"><div class="k">Ticket médio</div><div class="v" id="kTicket">—</div></div>
    <div class="kpi"><div class="k">Margem média</div><div class="v" id="kMargem">—</div></div>
    <div class="kpi"><div class="k">Lucro médio / mês</div><div class="v" id="kLucro">—</div></div>
  </div>

  <div class="card">
    <div class="card-head">
      <h3>Orçamentos</h3>
      <div class="search-wrap">
        <input type="text" id="busca" placeholder="Buscar cliente…" oninput="filtrar()">
      </div>
    </div>
    <div id="tabela"><div class="loading">Carregando…</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const db = createClient(
  'https://dfsmwzmtainiclcwpigw.supabase.co',
  'sb_publishable_trZuSsmSkPKN9Ry0WytyUg_xn7UYBo3'
);

const brl = v => isFinite(v) && v !== null
  ? Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL",minimumFractionDigits:0,maximumFractionDigits:0})
  : "—";
const pct = v => v !== null && isFinite(v) ? Number(v).toFixed(1).replace(".",",")+"%" : "—";
const dataFmt = s => new Date(s).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});

let todos = [];

async function carregar() {
  const { data, error } = await db
    .from("orcamentos")
    .select("*, projetos(nome_projeto, quantidade_modulos, kwp_sistema), integradores(nome_empresa)")
    .order("criado_em", { ascending: false });

  if (error) {
    document.getElementById("tabela").innerHTML =
      `<div class="empty"><div class="icon">⚠️</div><p>Erro ao carregar: ${error.message}</p></div>`;
    return;
  }

  todos = data || [];
  atualizarKpis(todos);
  renderTabela(todos);
}

function atualizarKpis(dados) {
  document.getElementById("kTotal").textContent = dados.length;
  if (!dados.length) return;

  const ticketMedio = dados.reduce((s,r) => s + (r.ticket||0), 0) / dados.length;
  const margemMedia = dados.reduce((s,r) => s + (r.margem_contribuicao_pct||0), 0) / dados.length;
  const lucroMedio  = dados.reduce((s,r) => s + (r.lucro_mensal||0), 0) / dados.length;

  document.getElementById("kTicket").textContent = brl(ticketMedio);
  document.getElementById("kMargem").textContent = pct(margemMedia);
  document.getElementById("kLucro").textContent  = brl(lucroMedio);
}

function renderTabela(dados) {
  if (!dados.length) {
    document.getElementById("tabela").innerHTML =
      `<div class="empty"><div class="icon">📋</div><p><strong>Nenhum orçamento salvo ainda.</strong></p><p>Preencha o dashboard e clique em "Salvar orçamento".</p></div>`;
    return;
  }

  let html = `<table>
    <thead><tr>
      <th>Data</th>
      <th>Empresa</th>
      <th>Projeto</th>
      <th class="r hide-sm">kWp</th>
      <th class="r hide-sm">Ticket</th>
      <th class="r hide-sm">Custo direto</th>
      <th class="r">Margem %</th>
      <th class="r">Lucro / mês</th>
      <th class="r hide-sm">Preço sugerido</th>
    </tr></thead><tbody>`;

  dados.forEach(r => {
    const lucrativo = (r.lucro_mensal || 0) >= 0;
    const empresa   = r.integradores?.nome_empresa || '—';
    const projeto   = r.projetos?.nome_projeto     || '—';
    const kwp       = r.projetos?.kwp_sistema      != null ? r.projetos.kwp_sistema+' kWp' : '—';
    html += `<tr>
      <td class="date-cell">${dataFmt(r.criado_em)}</td>
      <td class="emp-cell" title="${empresa}">${empresa}</td>
      <td class="proj-cell" title="${projeto}">${projeto}</td>
      <td class="r hide-sm">${kwp}</td>
      <td class="r hide-sm">${brl(r.ticket)}</td>
      <td class="r hide-sm">${brl(r.custo_direto_total)}</td>
      <td class="r"><span class="badge ${lucrativo?'pos':'neg'}">${pct(r.margem_contribuicao_pct)}</span></td>
      <td class="r" style="color:${lucrativo?'var(--positive)':'var(--negative)'};font-weight:700">${brl(r.lucro_mensal)}</td>
      <td class="r hide-sm">${brl(r.preco_sugerido)}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById("tabela").innerHTML = html;
}

function filtrar() {
  const termo = document.getElementById("busca").value.toLowerCase();
  const filtrado = todos.filter(r =>
    (r.integradores?.nome_empresa||"").toLowerCase().includes(termo) ||
    (r.projetos?.nome_projeto||"").toLowerCase().includes(termo)
  );
  renderTabela(filtrado);
}

carregar();
</script>
</body>
</html>
