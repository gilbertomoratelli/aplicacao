<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro da Integradora · Solar</title>
<style>
  :root{
    --bg:#F4F2EC;--surface:#FFFFFF;--ink:#1B1A16;--muted:#736F64;--hair:#E3DFD4;
    --solar:#E8820C;--teal:#0F3D3E;--positive:#2F7A4D;--negative:#B23A2E;
    --mono:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 20px;-webkit-font-smoothing:antialiased}
  .wrap{width:100%;max-width:480px}

  .brand{display:flex;align-items:center;gap:10px;margin-bottom:32px}
  .logo{width:32px;height:32px;border-radius:8px;background:var(--solar);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;flex-shrink:0}
  .brand-name{font-size:13px;font-weight:700;letter-spacing:.5px;color:var(--ink)}
  .brand-sub{font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase}

  .stepper{display:flex;align-items:center;margin-bottom:28px}
  .step{display:flex;flex-direction:column;align-items:center;gap:5px}
  .sn{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--hair);color:var(--muted);transition:.2s}
  .sl{font-size:10px;color:var(--muted);white-space:nowrap;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .step.active .sn{background:var(--solar);color:#fff}
  .step.active .sl{color:var(--solar)}
  .step.done .sn{background:var(--teal);color:#fff}
  .step.done .sl{color:var(--teal)}
  .sline{flex:1;height:2px;background:var(--hair);margin:0 8px;margin-bottom:16px}
  .sline.done{background:var(--teal)}
  .step[onclick]{cursor:pointer}
  .step[onclick]:hover .sn{opacity:.7}

  .card{background:var(--surface);border:1px solid var(--hair);border-radius:16px;padding:28px}
  .card-title{font-size:20px;font-weight:800;letter-spacing:-.3px;margin:0 0 4px}
  .card-sub{font-size:13px;color:var(--muted);margin:0 0 24px}

  .returning{background:#EEF7F2;border:1px solid #BEE0CC;border-radius:10px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .returning .nome{font-weight:700;font-size:14px;color:var(--teal)}
  .returning .hint{font-size:12px;color:var(--muted)}
  .btn-cont{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:var(--sans)}
  .btn-cont:hover{opacity:.9}

  label.fld{display:block;margin-bottom:16px}
  label.fld .lbl{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
  label.fld .req{color:var(--solar)}
  .inwrap{display:flex;align-items:center;border:1px solid var(--hair);border-radius:9px;background:var(--surface);overflow:hidden;transition:.15s}
  .inwrap:focus-within{outline:2px solid var(--solar);outline-offset:1px}
  .inwrap input,.inwrap select{flex:1;border:none;outline:none;padding:10px 12px;font-size:15px;font-family:var(--sans);color:var(--ink);background:transparent;width:100%}
  .inwrap select{cursor:pointer}
  input.plain,select.plain{width:100%;border:1px solid var(--hair);border-radius:9px;padding:10px 12px;font-size:15px;font-family:var(--sans);color:var(--ink);outline:none;background:var(--surface);transition:.15s}
  input.plain:focus,select.plain:focus{outline:2px solid var(--solar);outline-offset:1px}
  .err{font-size:11px;color:var(--negative);margin-top:4px;display:none}

  .divider{display:flex;align-items:center;gap:10px;margin:20px 0;color:var(--muted);font-size:12px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--hair)}

  .btn-primary{width:100%;background:var(--solar);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:.15s;margin-top:4px}
  .btn-primary:hover{opacity:.9}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed}

  .foot-note{text-align:center;font-size:12px;color:var(--muted);margin-top:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="logo">☀</div>
    <div>
      <div class="brand-name">Integradora Solar</div>
      <div class="brand-sub">Precificação de Projetos</div>
    </div>
  </div>

  <div class="stepper">
    <div class="step active"><div class="sn">1</div><div class="sl">Empresa</div></div>
    <div class="sline"></div>
    <div class="step" onclick="location.href='configuracoes.html?onboarding=1'"><div class="sn">2</div><div class="sl">Custos</div></div>
    <div class="sline"></div>
    <div class="step" onclick="location.href='projeto.html'"><div class="sn">3</div><div class="sl">Projeto</div></div>
    <div class="sline"></div>
    <div class="step" onclick="location.href='index.html'"><div class="sn">4</div><div class="sl">Precificação</div></div>
  </div>

  <div class="card">
    <h2 class="card-title">Dados da Integradora</h2>
    <p class="card-sub">Preencha os dados da empresa responsável pelo projeto.</p>

    <div class="returning" id="returning" style="display:none">
      <div>
        <div class="nome" id="retNome"></div>
        <div class="hint">Dados salvos anteriormente</div>
      </div>
      <button class="btn-cont" onclick="continuar()">Continuar →</button>
    </div>
    <div id="dividerRet" style="display:none"><div class="divider">ou preencha novamente</div></div>

    <form id="form" onsubmit="salvar(event)">
      <label class="fld">
        <span class="lbl">Nome da Empresa <span class="req">*</span></span>
        <input class="plain" type="text" id="nome_empresa" placeholder="Ex: Solar Norte Energia" autocomplete="organization">
        <span class="err" id="errNome">Campo obrigatório</span>
      </label>

      <label class="fld">
        <span class="lbl">CNPJ</span>
        <input class="plain" type="text" id="cnpj" placeholder="00.000.000/0000-00" maxlength="18" oninput="mascaraCNPJ(this)">
      </label>

      <label class="fld">
        <span class="lbl">Regime Tributário <span class="req">*</span></span>
        <select class="plain" id="regime">
          <option value="">Selecione…</option>
          <option value="MEI">MEI</option>
          <option value="Simples Nacional">Simples Nacional</option>
          <option value="Lucro Presumido">Lucro Presumido</option>
          <option value="Lucro Real">Lucro Real</option>
        </select>
        <span class="err" id="errRegime">Selecione um regime</span>
      </label>

      <label class="fld">
        <span class="lbl">E-mail <span class="req">*</span></span>
        <input class="plain" type="email" id="email" placeholder="contato@suaempresa.com.br" autocomplete="email">
        <span class="err" id="errEmail">E-mail inválido</span>
      </label>

      <label class="fld">
        <span class="lbl">WhatsApp <span class="req">*</span></span>
        <input class="plain" type="tel" id="whatsapp" placeholder="(00) 00000-0000" maxlength="15" oninput="mascaraTel(this)">
        <span class="err" id="errWhats">Campo obrigatório</span>
      </label>

      <button class="btn-primary" type="submit" id="btnSalvar">Continuar →</button>
    </form>
  </div>
  <p class="foot-note">Seus dados ficam salvos neste navegador para uso futuro.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const db = createClient(
  'https://dfsmwzmtainiclcwpigw.supabase.co',
  'sb_publishable_trZuSsmSkPKN9Ry0WytyUg_xn7UYBo3'
);

function mascaraCNPJ(el) {
  let v = el.value.replace(/\D/g,'').slice(0,14);
  if(v.length>12) v=v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
  else if(v.length>8) v=v.replace(/(\d{2})(\d{3})(\d{3})(\d+)/,'$1.$2.$3/$4');
  else if(v.length>5) v=v.replace(/(\d{2})(\d{3})(\d+)/,'$1.$2.$3');
  else if(v.length>2) v=v.replace(/(\d{2})(\d+)/,'$1.$2');
  el.value=v;
}
function mascaraTel(el) {
  let v = el.value.replace(/\D/g,'').slice(0,11);
  if(v.length>10) v=v.replace(/(\d{2})(\d{5})(\d{4})/,'($1) $2-$3');
  else if(v.length>6) v=v.replace(/(\d{2})(\d{4})(\d*)/,'($1) $2-$3');
  else if(v.length>2) v=v.replace(/(\d{2})(\d*)/,'($1) $2');
  el.value=v;
}

function carregarSalvo() {
  const salvo = JSON.parse(localStorage.getItem('integrador')||'null');
  if(salvo?.nome_empresa) {
    document.getElementById('retNome').textContent = salvo.nome_empresa;
    document.getElementById('returning').style.display='flex';
    document.getElementById('dividerRet').style.display='block';
    document.getElementById('nome_empresa').value = salvo.nome_empresa||'';
    document.getElementById('cnpj').value = salvo.cnpj||'';
    document.getElementById('regime').value = salvo.regime_tributario||'';
    document.getElementById('email').value = salvo.email||'';
    document.getElementById('whatsapp').value = salvo.whatsapp||'';
  }
}

function continuar() {
  window.location.href = 'configuracoes.html?onboarding=1';
}

function validar() {
  let ok=true;
  const campos=[
    {id:'nome_empresa',err:'errNome',check:v=>v.trim().length>1},
    {id:'regime',err:'errRegime',check:v=>v!==''},
    {id:'email',err:'errEmail',check:v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)},
    {id:'whatsapp',err:'errWhats',check:v=>v.replace(/\D/g,'').length>=10},
  ];
  campos.forEach(c=>{
    const v=document.getElementById(c.id).value;
    const valido=c.check(v);
    document.getElementById(c.err).style.display=valido?'none':'block';
    if(!valido) ok=false;
  });
  return ok;
}

async function salvar(e) {
  e.preventDefault();
  if(!validar()) return;

  const btn=document.getElementById('btnSalvar');
  btn.disabled=true; btn.textContent='Salvando…';

  const payload={
    nome_empresa: document.getElementById('nome_empresa').value.trim(),
    cnpj: document.getElementById('cnpj').value.trim()||null,
    regime_tributario: document.getElementById('regime').value,
    email: document.getElementById('email').value.trim(),
    whatsapp: document.getElementById('whatsapp').value.trim(),
  };

  const {data,error}=await db.from('integradores').insert(payload).select().single();

  btn.disabled=false; btn.textContent='Continuar →';

  if(error){ alert('Erro ao salvar: '+error.message); return; }

  localStorage.setItem('integrador', JSON.stringify({...payload, id: data.id}));
  window.location.href='configuracoes.html?onboarding=1';
}

carregarSalvo();
</script>
</body>
</html>
